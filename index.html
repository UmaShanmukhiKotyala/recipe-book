<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💖 Recipe Book</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🍓 Recipe Book 💖</h1>
  <p>Cook. Save. Enjoy.</p>
</header>

<div class="main-container">

  <!-- ADD FORM -->
  <div class="form-card">
    <h2>Add / Update Recipe</h2>

    <input type="text" id="title" placeholder="Recipe Title">

    <textarea id="ingredients" placeholder="Ingredients (press Enter for new line)"></textarea>

    <textarea id="steps" placeholder="Steps (press Enter for new line)"></textarea>

    <input type="text" id="image" placeholder="Paste Image URL">

    <button onclick="addRecipe()">Save Recipe</button>
  </div>

  <!-- SEARCH -->
  <div class="search-box">
    <input type="text" id="search" placeholder="🔍 Search..." onkeyup="searchRecipe()">
  </div>

  <!-- CARDS -->
  <div id="recipeList" class="recipe-grid"></div>

</div>

<!-- MODAL -->
<div id="recipeModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>

    <img id="modalImg">
    <h2 id="modalTitle"></h2>

    <p><b>Ingredients:</b><br><span id="modalIngredients"></span></p>
    <p><b>Steps:</b><br><span id="modalSteps"></span></p>

    <div class="modal-buttons">
      <button class="edit-btn" onclick="editRecipe()">✏️ Edit</button>
      <button class="delete-btn" onclick="deleteRecipe()">🗑 Delete</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
